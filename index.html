<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharivaru</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

 <div class="app">

    <!-- LEFT MAIN FEED -->
    <div class="main-feed">

        <header class="topbar">
            <h1>📚 Dharivaru</h1>
            <p>Students helping students</p>
        </header>

        <!-- TOGGLE -->
        <div class="toggle">
            <button id="needBtn" class="active">🆘 Need Help</button>
            <button id="helpBtn">🤝 Can Help</button>
        </div>

        <!-- FORM -->
        <div class="card form-card">

            <h2 id="formTitle">Ask a question</h2>

            <form id="postForm">

                <input id="name" placeholder="Your name" required>

                <select id="subject">
                    <option>Mathematics</option>
                    <option>Science</option>
                    <option>English</option>
                    <option>Dhivehi</option>
                    <option>Programming</option>
                    <option>Other</option>
                </select>

                <textarea id="description" placeholder="Ask your question..." required></textarea>

                <input id="contact" placeholder="Contact (optional)">

                <button type="submit">Post</button>

            </form>

        </div>

        <!-- FEED -->
        <div id="postsContainer"></div>

    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar">

        <h2>📚 Resources</h2>

        <form id="resourceForm">

            <input id="resTitle" placeholder="Resource title" required>

            <select id="resSubject">
                <option>Mathematics</option>
                <option>Science</option>
                <option>English</option>
                <option>Programming</option>
            </select>

            <input id="resLink" placeholder="Link" required>

            <button type="submit">Add</button>

        </form>

        <div id="resourcesContainer"></div>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
