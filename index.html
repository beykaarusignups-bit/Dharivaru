<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharivaru</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Dharivaru</h1>
        <p>Students helping students.</p>
    </header>

    <!-- TOGGLE SECTION -->
    <section class="toggle-section">

        <h2>What do you need?</h2>

        <div class="buttons">
            <button id="needBtn" class="active">📚 I Need Help</button>
            <button id="helpBtn">🤝 I Can Help</button>
        </div>

    </section>

    <!-- HELP FORM -->
    <section class="form-container">

        <h2 id="formTitle">Tell us what you need 📚</h2>

        <form id="postForm">

            <input type="text" id="name" placeholder="Your Name" required>

            <select id="subject">
                <option>Mathematics</option>
                <option>English</option>
                <option>Dhivehi</option>
                <option>Science</option>
                <option>Biology</option>
                <option>Chemistry</option>
                <option>Physics</option>
                <option>Accounting</option>
                <option>Business</option>
                <option>ICT</option>
                <option>Programming</option>
                <option>Other</option>
            </select>

            <textarea id="description" rows="5"
                placeholder="Describe what you need help with"
                required></textarea>

            <input type="text" id="contact"
                placeholder="Contact (Telegram / WhatsApp)">

            <button type="submit" class="submit-btn">
                Submit
            </button>

        </form>

    </section>

    <!-- POSTS -->
    <section class="posts-section">

        <h2>Recent Posts</h2>

        <div id="postsContainer"></div>

    </section>

    <!-- RESOURCES -->
    <section class="resources-section">

        <h2>📚 Study Resources</h2>

        <form id="resourceForm">

            <input type="text" id="resTitle"
                placeholder="Resource Title" required>

            <select id="resSubject">
                <option>Mathematics</option>
                <option>English</option>
                <option>Dhivehi</option>
                <option>Science</option>
                <option>Biology</option>
                <option>Chemistry</option>
                <option>Physics</option>
                <option>Accounting</option>
                <option>Business</option>
                <option>ICT</option>
                <option>Programming</option>
            </select>

            <input type="text" id="resLink"
                placeholder="Google Drive / Link" required>

            <textarea id="resDesc"
                placeholder="Short description"></textarea>

            <button type="submit">
                Add Resource
            </button>

        </form>

        <div id="resourcesContainer"></div>

    </section>

    <!-- SCRIPT -->
    <script type="module" src="script.js"></script>

</body>
</html>
