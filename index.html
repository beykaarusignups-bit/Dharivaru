<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharivaru</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- MAIN FEED -->
    <div class="main-feed">

        <header class="topbar">
            <h1>📚 Dharivaru</h1>
            <p>Students helping students</p>
        </header>

        <!-- TOGGLE -->
        <div class="toggle">
            <button id="needBtn" class="active">🆘 Need Help</button>
            <button id="helpBtn">🤝 Can Help</button>
        </div>

        <!-- POST FORM -->
        <div class="card">

            <h2 id="formTitle">Tell us what you need</h2>

            <form id="postForm">

                <input id="name" placeholder="Your name" required>

                <select id="subject">
                    <option>Mathematics</option>
                    <option>Science</option>
                    <option>English</option>
                    <option>Dhivehi</option>
                    <option>Programming</option>
                </select>

                <textarea id="description" placeholder="Write here..." required></textarea>

                <input id="contact" placeholder="Contact (optional)">

                <button type="submit">Post</button>

            </form>

        </div>

        <!-- POSTS FEED -->
        <div id="postsContainer"></div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="card">

            <h2>📚 Resources</h2>

            <form id="resourceForm">

                <input id="resTitle" placeholder="Title" required>

                <select id="resSubject">
                    <option>Mathematics</option>
                    <option>Science</option>
                    <option>Programming</option>
                </select>

                <input id="resLink" placeholder="Link" required>

                <textarea id="resDesc" placeholder="Description"></textarea>

                <button type="submit">Add Resource</button>

            </form>

            <div id="resourcesContainer"></div>

        </div>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
